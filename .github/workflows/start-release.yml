name: Start Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - minor
          - patch
          - major
        default: minor

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Create release branch
        run: ./etc/scripts/release/start-release.sh "${{ inputs.bump_type }}"

      - name: Run version sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(cat "${{ runner.temp }}/release_branch")
          git checkout "$BRANCH"
          ./etc/scripts/release/version-sync.sh "$BRANCH"

      - name: Create release tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(cat "${{ runner.temp }}/release_branch")
          ./etc/scripts/release/create-issue.sh "$BRANCH"

      - name: Summary
        run: |
          CURRENT=$(cat "${{ runner.temp }}/current_version")
          NEW=$(cat "${{ runner.temp }}/new_version")
          BRANCH=$(cat "${{ runner.temp }}/release_branch")

          echo "## Release Branch Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${CURRENT} → v${NEW}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: merge the version sync PR, then run **Publish Release**" >> $GITHUB_STEP_SUMMARY
