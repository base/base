name: Create RC

on:
  push:
    branches:
      - 'releases/v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read-tag.outputs.tag }}
      skip: ${{ steps.version-check.outputs.skip }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Check version is set
        id: version-check
        run: |
          source ./etc/scripts/release/common.sh
          VERSION=$(get_cargo_version)
          if [[ "$VERSION" == "0.0.0" ]]; then
            echo "::notice::Cargo.toml version is 0.0.0 — version sync PR not yet merged. Skipping RC."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version-check.outputs.skip == 'false'
        run: ./etc/scripts/release/create-tag.sh "${{ github.ref_name }}" rc

      - name: Read tag
        id: read-tag
        if: steps.version-check.outputs.skip == 'false'
        run: |
          TAG_FILE="${{ runner.temp }}/release_tag"
          if [[ ! -f "$TAG_FILE" ]]; then
            echo "::error::release_tag file not found — create-tag.sh may have failed"
            exit 1
          fi
          TAG=$(cat "$TAG_FILE")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Summary
        run: |
          SKIP="${{ steps.version-check.outputs.skip }}"
          if [[ "$SKIP" == "true" ]]; then
            echo "## RC Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Cargo.toml version is still 0.0.0. Merge the version sync PR first." >> $GITHUB_STEP_SUMMARY
          else
            TAG="${{ steps.read-tag.outputs.tag }}"
            echo "## Tag Created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tag**: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
            echo "**Type**: Release Candidate" >> $GITHUB_STEP_SUMMARY
          fi

  build:
    needs: [create-tag]
    if: needs.create-tag.outputs.skip == 'false'
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
      is_final: false
    secrets: inherit
