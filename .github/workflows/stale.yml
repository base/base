name: Mark stale issues and PRs

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
permissions:
  contents: read

jobs:
  label-maintainer-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Exempt core maintainer issues from stale
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          MAINTAINERS="refcell danyalprout cody-wang-cb haardikk21 meyer9 wlawt niran mw2000"
          for maintainer in $MAINTAINERS; do
            gh issue list \
              --repo "$REPO" \
              --author "$maintainer" \
              --state open \
              --json number \
              --jq '.[].number' | while read -r issue_num; do
                gh issue edit "$issue_num" \
                  --repo "$REPO" \
                  --add-label "M-prevent-stale" 2>/dev/null || true
            done
          done

  stale:
    needs: label-maintainer-issues
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - uses: actions/stale@5f858e3efba33a5ca4407a664cc011ad407f2008 # v10.1.0
        with:
          days-before-stale: 14
          days-before-close: 5
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
          stale-pr-message: 'This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
          close-issue-message: 'This issue was closed because it has been inactive for 5 days since being marked as stale.'
          close-pr-message: 'This pull request was closed because it has been inactive for 5 days since being marked as stale.'
          stale-issue-label: F-stale
          stale-pr-label: F-stale
          exempt-issue-labels: 'M-keep-open,M-prevent-stale'
          exempt-pr-labels: M-keep-open
