name: Lychee Checks

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

# Prevent concurrent link-check runs from hitting GitHub rate limits.
# New runs cancel any in-progress run for the same ref.
concurrency:
  group: lychee-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lychee-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config ./lychee.toml --cache-exclude-status 429 --root-dir ${{ github.workspace }}/docs/specs/public --exclude-path 'crates/shared/primitives/contracts/' '**/README.md' './docs/**/*.md' './docs/**/*.mdx' './docs/**/*.html' './docs/**/*.json'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
