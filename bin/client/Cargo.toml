[package]
name = "base-client"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Proof
base-proof.workspace = true
base-proof-client.workspace = true
base-proof-fpvm-precompiles.workspace = true
base-proof-preimage.workspace = true
base-proof-std-fpvm.workspace = true
base-proof-std-fpvm-proc.workspace = true

# Macro dependencies
cfg-if.workspace = true

# Tracing
tracing.workspace = true

[[bin]]
name = "base-client"
path = "src/main.rs"

[features]
default = ["client-tracing"]
client-tracing = ["base-proof-std-fpvm/tracing"]

[lints]
workspace = true
