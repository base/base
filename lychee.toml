verbose = "debug"
no_progress = false
exclude_all_private = false
accept = [200, 403] # 403 status code is often returned by private repos instead of 404
exclude_path = [
    "crates/utilities/test-utils/contracts/"
]
exclude = [
    'foo.bar',
    'localhost',
    'https://img.shields.io/github/commit-activity/w/base/base',
    'https://img.shields.io/github/issues-pr-raw/base/base',
    'https://img.shields.io/website-up-down-green-red/https/base.org.svg',
    'https://rustup.rs/',
    'https://base.mirror.xyz/',
    # GitHub URLs that get rate-limited (429) - they are valid
    'https://github.com/base/base/blob/main/LICENSE',
    'https://github.com/base/base/blob/master/LICENSE',
    'https://github.com/base/base/blob/main/crates/',
    'https://github.com/paradigmxyz/reth/',
]
