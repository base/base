# Load Test Configuration
# Required fields are marked with [REQUIRED], all others are optional with defaults shown

# [REQUIRED] RPC endpoint URL
rpc: https://base-sepolia-alpha.cbhq.net

# [REQUIRED] Private key for funding test accounts (hex with 0x prefix)
funder_key: "<your key here>"

# Mnemonic phrase for deriving sender accounts
# If not provided, accounts are generated deterministically from seed
mnemonic: "test test test test test test test test test test test junk"

# Amount to fund each sender account in wei (default: 0.1 ETH)
funding_amount: "100000000000000000"

# Number of sender accounts (default: 10)
sender_count: 10

# Skip first N accounts in derivation - useful for parallel runs (default: 0)
sender_offset: 0

# Max in-flight transactions per sender (default: 16)
in_flight_per_sender: 16

# Test duration using humantime format: "30s", "5m", "1h 30m" (default: "30s")
duration: "30s"

# Target transactions per second (default: 100)
target_tps: 100

# Seed for deterministic account generation when mnemonic not provided (default: 42)
seed: 42

# Chain ID - if not provided, fetched from RPC
chain_id: 11763072

# Transaction types with weights (default: 100% transfers)
# Higher weight = more frequent selection
transactions:
  - weight: 70
    type: transfer
  - weight: 20
    type: calldata
    max_size: 256
  - weight: 10
    type: precompile
    target: sha256

# Available transaction types:
#
# transfer - Simple ETH transfer (21000 gas)
#   - weight: 100
#     type: transfer
#
# calldata - ETH transfer with random calldata
#   - weight: 50
#     type: calldata
#     max_size: 128    # max bytes of random calldata
#
# erc20 - ERC20 token transfer (requires deployed contract)
#   - weight: 25
#     type: erc20
#     contract: "0x..."  # ERC20 contract address
#
# precompile - Call to EVM precompile
#   - weight: 25
#     type: precompile
#     target: sha256   # sha256, identity, ecrecover
