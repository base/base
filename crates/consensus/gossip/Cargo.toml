[package]
name = "base-consensus-gossip"
version.workspace = true
description = "Gossip protocol implementation for the OP Stack"

edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
# consensus
base-macros.workspace = true
base-consensus-disc.workspace = true
base-consensus-peers.workspace = true
base-consensus-genesis.workspace = true

# Alloy
alloy-rlp = { workspace = true, features = ["std"] }
alloy-eips = { workspace = true, features = ["std"] }
alloy-consensus = { workspace = true, features = ["std"] }
alloy-rpc-types-engine = { workspace = true, features = ["std"] }
alloy-primitives = { workspace = true, features = ["k256", "getrandom"] }

# Base Alloy
base-alloy-consensus = { workspace = true, features = ["k256"] }
base-alloy-rpc-types-engine = { workspace = true, features = ["std", "serde"] }

# Networking
snap.workspace = true
futures.workspace = true
libp2p-stream.workspace = true
ipnet = { workspace = true, features = ["serde"] }
openssl = { workspace = true, features = ["vendored"] }
discv5 = { workspace = true, features = ["libp2p"] }
libp2p-identity = { workspace = true, features = ["secp256k1"] }
libp2p = { workspace = true, features = ["macros", "tokio", "tcp", "dns", "noise", "gossipsub", "ping", "yamux", "identify"] }

# Misc
tokio.workspace = true
serde_repr.workspace = true
serde = { workspace = true, features = ["std"] }
tracing = { workspace = true, features = ["std"] }
thiserror = { workspace = true, features = ["std"] }
derive_more = { workspace = true, features = ["display", "deref", "debug"] }

# `metrics` feature
metrics = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true
multihash.workspace = true
serde_json = { workspace = true, features = ["std"] }
alloy-eips = { workspace = true, features = ["std"] }
alloy-chains = { workspace = true, features = ["std"] }

rand = { workspace = true, features = ["thread_rng"] }
arbitrary = { workspace = true, features = ["derive"] }
alloy-primitives = { workspace = true, features = ["arbitrary"] }
alloy-rpc-types-engine = { workspace = true, features = ["std"] }
base-alloy-consensus = { workspace = true, features = ["arbitrary", "k256"] }
alloy-consensus = { workspace = true, features = ["arbitrary", "k256", "std"] }

[features]
default = []
metrics = [ "base-consensus-disc/metrics", "dep:metrics", "libp2p/metrics" ]
