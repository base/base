[package]
name = "base-consensus-sources"
version.workspace = true
description = "Data source types and utilities for the base-consensus-node"

edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
exclude.workspace = true

[lints]
workspace = true

[dependencies]
# Workspace

# Alloy
alloy-transport.workspace = true
alloy-primitives.workspace = true
alloy-rpc-client.workspace = true
alloy-transport-http = { workspace = true, features = ["reqwest", "reqwest-rustls-tls", "hyper", "hyper-tls"] }

alloy-signer.workspace = true
alloy-signer-local.workspace = true

# Base Alloy
base-alloy-rpc-types-engine = { workspace = true, features = ["std", "serde"] }

# Misc
derive_more.workspace = true
tracing = { workspace = true, features = ["std"] }
thiserror = { workspace = true, features = ["std"] }

# HTTP client and TLS for remote signer
url.workspace = true
notify.workspace = true
rustls.workspace = true
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true, features = ["std"] }
tokio = { workspace = true, features = ["full"] }

[features]
default = []

[dev-dependencies]
tokio.workspace = true
serde_json = { workspace = true, features = ["std"] }
