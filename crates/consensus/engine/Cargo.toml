[package]
name = "base-consensus-engine"
description = "An implementation of the OP Stack engine client"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
# workspace
base-macros.workspace = true
base-consensus-genesis.workspace = true
base-protocol = {workspace = true, features = ["serde", "std"]}

# alloy
alloy-network.workspace = true
alloy-transport.workspace = true
alloy-primitives.workspace = true
alloy-rpc-client.workspace = true
alloy-eips = { workspace = true, features = ["std"] }
alloy-consensus = { workspace = true, features = ["std"] }
alloy-rpc-types-eth = { workspace = true, features = ["std"] }
alloy-rpc-types-engine = { workspace = true, features = ["jwt", "serde", "std"] }
alloy-transport-http = { workspace = true, features = ["reqwest", "hyper", "jwt-auth"] }
alloy-provider = { workspace = true, features = ["ipc", "reqwest", "reqwest-rustls-tls", "engine-api"] }

# base-alloy
base-alloy-network.workspace = true
base-alloy-provider.workspace = true
base-alloy-rpc-types.workspace = true
base-alloy-consensus = { workspace = true, features = ["std"] }
base-alloy-rpc-types-engine = { workspace = true, features = ["serde", "std"] }

# general
url.workspace = true
tokio.workspace = true
tower.workspace = true
async-trait.workspace = true
http-body-util.workspace = true
serde = { workspace = true, features = ["std"] }
tracing = { workspace = true, features = ["std"] }
serde_json = { workspace = true, features = ["std"] }
thiserror = { workspace = true, features = ["std"] }
derive_more = { workspace = true, features = ["display", "deref", "from_str", "constructor"] }

# metrics
metrics = { workspace = true, optional = true }

[dev-dependencies]
rstest.workspace = true
arbitrary.workspace = true
base-alloy-hardforks.workspace = true
base-consensus-registry.workspace = true
metrics-exporter-prometheus.workspace = true
rand = {workspace = true, features = ["thread_rng"]}
base-alloy-rpc-types = {workspace = true, features = ["arbitrary", "k256"]}

[features]
metrics = [ "dep:metrics" ]
test-utils = [ "base-protocol/test-utils" ]
