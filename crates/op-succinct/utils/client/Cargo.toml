[package]
name = "op-succinct-client-utils"
version.workspace = true

edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
# ethereum
op-alloy-consensus.workspace = true
alloy-consensus.workspace = true
alloy-rlp.workspace = true
alloy-eips.workspace = true
alloy-primitives.workspace = true
alloy-sol-types.workspace = true

# Execution — pinned to kona-compatible versions (revm 33 ecosystem)
# These must NOT use workspace = true since workspace uses revm 34/alloy-evm 0.27
alloy-evm = { version = "0.24.2", default-features = false }
alloy-op-evm = { version = "0.24.2", default-features = false }
op-revm = { version = "14.1.0", default-features = false }
revm = { version = "33.1.0", default-features = false, features = ["bn"] }
revm-precompile = { version = "31.0.0", default-features = false }

# kona
kona-preimage.workspace = true
kona-derive.workspace = true
kona-proof.workspace = true
kona-executor.workspace = true
kona-driver.workspace = true
kona-protocol.workspace = true
kona-genesis.workspace = true

# general
anyhow.workspace = true
async-trait.workspace = true
serde_json.workspace = true
serde = { workspace = true, features = ["std", "derive"] }
rkyv.workspace = true
sha2.workspace = true
tracing.workspace = true
spin.workspace = true

# kzg
kzg-rs.workspace = true
cfg-if.workspace = true

[lints]
workspace = true
