[package]
name = "base-proof-host"
description = "Generic host-side infrastructure for the Base fault proof host."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
# Workspace
tokio.workspace = true
anyhow.workspace = true
tracing.workspace = true
thiserror.workspace = true
async-trait.workspace = true
serde_json.workspace = true

# Alloy
alloy-rlp.workspace = true
alloy-provider.workspace = true
alloy-transport.workspace = true
alloy-primitives.workspace = true
alloy-consensus = { workspace = true, features = ["std"] }

# Base
base-proof-mpt.workspace = true
base-proof-preimage = { workspace = true, features = ["std"] }

# Optional - precompiles
revm = { workspace = true, optional = true, features = ["std", "c-kzg", "secp256k1", "portable", "blst"] }

# Optional - disk
rocksdb = { workspace = true, optional = true, features = ["snappy", "bindgen-runtime"] }

# Optional - single
serde = { workspace = true, optional = true }
ark-ff = { workspace = true, optional = true }
alloy-eips = { workspace = true, optional = true }
alloy-network = { workspace = true, optional = true }
base-protocol = { workspace = true, optional = true }
base-alloy-network = { workspace = true, optional = true }
base-proof-std-fpvm = { workspace = true, optional = true }
base-consensus-providers = { workspace = true, optional = true }
alloy-rpc-types-beacon = { workspace = true, optional = true }
base-proof = { workspace = true, optional = true, features = ["std"] }
alloy-rpc-types = { workspace = true, optional = true, features = ["debug"] }
clap = { workspace = true, optional = true, features = ["derive", "env"] }
base-consensus-genesis = { workspace = true, optional = true, features = ["serde", "std"] }
base-alloy-rpc-types-engine = { workspace = true, optional = true, features = ["serde", "std"] }

[dev-dependencies]
proptest.workspace = true

[lints]
workspace = true

[features]
default = []
disk = [ "dep:rocksdb" ]
precompiles = [ "dep:revm" ]
single = [
	"dep:alloy-eips",
	"dep:alloy-network",
	"dep:alloy-rpc-types",
	"dep:alloy-rpc-types-beacon",
	"dep:ark-ff",
	"dep:base-alloy-network",
	"dep:base-alloy-rpc-types-engine",
	"dep:base-consensus-genesis",
	"dep:base-consensus-providers",
	"dep:base-proof",
	"dep:base-proof-std-fpvm",
	"dep:base-protocol",
	"dep:clap",
	"dep:serde",
	"disk",
	"precompiles",
]
