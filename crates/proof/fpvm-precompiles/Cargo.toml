[package]
name = "base-proof-fpvm-precompiles"
description = "FPVM-accelerated precompiles for the Base proof client"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
revm.workspace = true
alloy-evm.workspace = true
alloy-primitives.workspace = true
base-revm.workspace = true
base-alloy-evm.workspace = true
base-proof-preimage.workspace = true
base-proof.workspace = true

[dev-dependencies]
sha2.workspace = true
alloy-eips.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["full"] }
base-proof-preimage = { workspace = true, features = ["std"] }

[features]
std = [
	"revm/std",
	"alloy-evm/std",
	"base-revm/std",
	"base-proof/std",
	"base-alloy-evm/std",
	"alloy-primitives/std",
	"base-proof-preimage/std",
]
