[package]
name = "base-enclave"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
# Alloy
alloy-rlp.workspace = true
alloy-chains.workspace = true
alloy-trie = { workspace = true, features = ["std"] }
alloy-eips = { workspace = true, features = ["serde"] }
alloy-consensus = { workspace = true, features = ["serde"] }
alloy-primitives = { workspace = true, features = ["serde"] }

# Base Alloy
base-alloy-consensus = { workspace = true, features = ["serde"] }

# Proof
base-proof-primitives = { workspace = true, features = ["serde"] }
base-consensus-genesis = { workspace = true, features = ["serde"] }

# Consensus
base-protocol = { workspace = true, features = ["serde"] }

# Misc
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
hex.workspace = true
rstest.workspace = true
serde_json.workspace = true
