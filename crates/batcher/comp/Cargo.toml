[package]
name = "base-comp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Compression types for Base"

[lints]
workspace = true

[dependencies]
thiserror.workspace = true
alloy-rlp.workspace = true
alloy-eips.workspace = true
miniz_oxide.workspace = true
base-protocol.workspace = true
base-alloy-consensus.workspace = true
base-consensus-genesis.workspace = true
rand = { workspace = true, features = ["small_rng"] }

brotli = { workspace = true, optional = true }
alloy-primitives = { workspace = true, optional = true }

[dev-dependencies]
rstest.workspace = true
spin.workspace = true
proptest.workspace = true
serde_json.workspace = true
alloy-eips.workspace = true
alloy-sol-types.workspace = true
alloy-consensus.workspace = true
alloy-primitives = { workspace = true, features = ["arbitrary"] }
arbitrary = { workspace = true, features = ["derive"] }
tracing-subscriber = { workspace = true, features = ["fmt"] }

[features]
default = []
std = [
	"alloy-eips/std",
	"alloy-primitives?/std",
	"base-alloy-consensus/std",
	"base-consensus-genesis/std",
	"base-protocol/std",
	"brotli?/std",
	"dep:brotli",
	"miniz_oxide/std",
	"rand/std",
	"thiserror/std",
]
test-utils = [ "base-protocol/test-utils", "dep:alloy-primitives" ]
serde = [
	"alloy-primitives?/serde",
	"base-consensus-genesis/serde",
	"base-protocol/serde",
	"miniz_oxide/serde",
	"rand/serde",
]
arbitrary = [
	"alloy-primitives?/arbitrary",
	"base-consensus-genesis/arbitrary",
	"base-protocol/arbitrary",
]
