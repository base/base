[package]
name = "base-builder-publish"
description = "WebSocket broadcast publisher for the Base block builder"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
http.workspace = true
serde.workspace = true
futures.workspace = true
metrics.workspace = true
tracing.workspace = true
tokio-util.workspace = true
serde_json = { workspace = true, features = ["std"] }
parking_lot.workspace = true
base-ring-buffer.workspace = true
tokio-tungstenite.workspace = true
tokio = { workspace = true, features = ["net", "sync", "macros", "rt", "time"] }

[dev-dependencies]
rstest.workspace = true
criterion.workspace = true
tokio-tungstenite.workspace = true
tokio = { workspace = true, features = ["net", "sync", "macros", "rt", "rt-multi-thread", "test-util"] }

[[bench]]
name = "publisher"
harness = false
