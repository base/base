[package]
name = "base-succinct-fp"
version.workspace = true

edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
name = "fault_proof"
path = "src/lib.rs"

[[bin]]
name = "proposer"
path = "bin/proposer.rs"

[[bin]]
name = "challenger"
path = "bin/challenger.rs"

[dependencies]
# local
base-succinct-client-utils.workspace = true
base-succinct-elfs.workspace = true
base-succinct-ethereum-host-utils.workspace = true
base-succinct-host-utils.workspace = true
base-succinct-proof-utils.workspace = true
base-succinct-signer-utils.workspace = true

# sp1
sp1-sdk.workspace = true
sp1-cluster-utils.workspace = true

# alloy
alloy-contract.workspace = true
alloy-eips.workspace = true
alloy-network.workspace = true
alloy-primitives = { workspace = true, features = ["serde"] }
alloy-provider = { workspace = true, features = ["reqwest"] }
alloy-rpc-types-eth.workspace = true
alloy-rpc-types-trace.workspace = true
alloy-sol-macro.workspace = true
alloy-sol-types.workspace = true
alloy-transport-http = { workspace = true, features = [
    "reqwest",
    "reqwest-native-tls",
] }

# base
base-alloy-network.workspace = true
base-alloy-rpc-types.workspace = true

# general
anyhow.workspace = true
async-trait.workspace = true
clap = { workspace = true, features = ["derive"] }
dotenv.workspace = true
futures.workspace = true
rand.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tracing.workspace = true
hex.workspace = true
strum = { workspace = true, features = ["derive"] }
strum_macros.workspace = true
tikv-jemallocator.workspace = true
tempfile.workspace = true 

[dev-dependencies]
alloy-signer-local.workspace = true
alloy-node-bindings.workspace = true
base-succinct-bindings.workspace = true
serde_json.workspace = true
serde.workspace = true
alloy-rpc-types-trace.workspace = true
rstest.workspace = true 
which.workspace = true

[features]
default = ["ethereum"]
ethereum = ["base-succinct-proof-utils/ethereum"]
integration = []

[lints]
workspace = true
