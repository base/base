[package]
name = "base-succinct-prove"
version.workspace = true

edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "multi"
path = "bin/multi.rs"

[[bin]]
name = "agg"
path = "bin/agg.rs"

[dependencies]

# workspace
tokio.workspace = true
clap.workspace = true
anyhow.workspace = true
dotenv.workspace = true
csv.workspace = true
tracing.workspace = true
cfg-if.workspace = true
serde_json.workspace = true

# local
base-succinct-host-utils.workspace = true
base-succinct-client-utils.workspace = true
base-succinct-proof-utils.workspace = true
base-succinct-scripts = { path = "../utils" }
base-succinct-elfs.workspace = true
base-succinct-fp.workspace = true

# alloy
alloy-contract.workspace = true
alloy-eips.workspace = true
alloy-network.workspace = true
alloy-node-bindings.workspace = true
alloy-primitives.workspace = true
alloy-provider = { workspace = true, features = ["reqwest"] }
alloy-signer-local.workspace = true
alloy-sol-types.workspace = true
alloy-transport-http = { workspace = true, features = [
    "reqwest",
    "reqwest-native-tls",
] }

# sp1
sp1-sdk.workspace = true
sp1-cluster-utils.workspace = true

[dev-dependencies]
reqwest = { workspace = true, features = ["json"] }
rustls = { workspace = true, features = ["ring"] }

[build-dependencies]
base-succinct-build-utils.workspace = true

[features]
default = ["ethereum"]
ethereum = ["base-succinct-proof-utils/ethereum"]

[lints]
workspace = true
