[package]
name = "base-succinct-host-utils"
version.workspace = true

edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
default = [ "ansi" ]
ansi = []

[dependencies]

# sp1
sp1-sdk.workspace = true

# local
base-succinct-client-utils.workspace = true
base-succinct-elfs.workspace = true

# base
base-alloy-consensus.workspace = true
base-alloy-network.workspace = true

# base proof/consensus
base-consensus-derive.workspace = true
base-consensus-genesis.workspace = true
base-proof-host.workspace = true
base-proof-preimage.workspace = true
base-proof.workspace = true
base-protocol = { workspace = true, features = ["serde"] }
base-consensus-registry.workspace = true
base-proof-primitives.workspace = true
# Note: kona-rpc is NOT included to avoid rollup-boost dependency chain.
# RPC types (OutputResponse, SafeHeadResponse) are defined locally in src/rpc_types.rs


# alloy
alloy-consensus.workspace = true
alloy-contract.workspace = true
alloy-eips.workspace = true
alloy-primitives.workspace = true
alloy-provider.workspace = true
alloy-rlp.workspace = true
alloy-sol-types.workspace = true
alloy-network.workspace = true

# general
anyhow.workspace = true
async-trait.workspace = true
bincode = { workspace = true, features = ["serde"] }
cfg-if.workspace = true
c-kzg.workspace = true
futures.workspace = true
kzg-rs.workspace = true
metrics.workspace = true
metrics-exporter-prometheus = { workspace = true, features = ["http-listener"] }
metrics-process = { workspace = true, features = ["metrics-rs"] }
num-format.workspace = true
reqwest = { workspace = true, features = ["json"] }
rkyv.workspace = true
serde.workspace = true
serde_cbor.workspace = true
serde_json.workspace = true
strum.workspace = true
tokio.workspace = true
tracing.workspace = true
lazy_static.workspace = true

# cargo metadata
cargo_metadata.workspace = true

# logging and telemetry
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
tracing-opentelemetry.workspace = true
opentelemetry.workspace = true
opentelemetry_sdk.workspace = true
opentelemetry-stdout.workspace = true
opentelemetry-otlp.workspace = true
opentelemetry-appender-tracing.workspace = true

[lints]
workspace = true
