[package]
name = "base-tx-manager"
description = "Transaction lifecycle management for Base onchain components"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# alloy
backon.workspace = true
alloy-network.workspace = true
alloy-provider.workspace = true
alloy-eips = { workspace = true, features = ["std"] }
alloy-primitives = { workspace = true, features = ["std"] }
alloy-rpc-types-eth = { workspace = true, features = ["std"] }

# misc
thiserror.workspace = true
tracing = { workspace = true, features = ["std"] }
tokio = { workspace = true, features = ["sync", "time"] }

[dev-dependencies]
rayon.workspace = true
rstest.workspace = true
proptest.workspace = true
humantime.workspace = true
alloy-consensus.workspace = true
alloy-node-bindings.workspace = true
alloy-signer-local.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }
tokio = { workspace = true, features = ["macros", "net", "rt", "rt-multi-thread"] }
